<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ride Share Live</title>

<style>
body {font-family: Arial;margin:0;background: linear-gradient(135deg,#141e30,#243b55);color:white;}
header {text-align:center;padding:15px;background:#00000080;}
.container {padding:15px;}
.card {background:white;color:black;padding:15px;border-radius:12px;margin-bottom:15px;}
input {width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc;}
button {width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px;background:#28a745;color:white;font-weight:bold;}
.ride {background:#fff;color:black;padding:10px;border-radius:10px;margin-top:10px;}
</style>
</head>

<body>

<header>
  <h2>🚀 Ride Share Live</h2>
</header>

<div class="container">

<!-- WALLET -->
<div class="card">
<h3>💰 Wallet</h3>
<p id="userId"></p>
<p>Coins: <span id="coins">0</span></p>

<input id="sendTo" placeholder="Send to User ID">
<input id="amount" placeholder="Amount">
<button onclick="sendCoins()">Send Coins</button>
</div>

<!-- UPI RECHARGE -->
<div class="card">
<h3>💳 Add Coins (Manual)</h3>
<p>Send money to UPI: <b>mratnamnalli@ybl</b></p>
<p>₹1 = 10 Coins</p>

<input id="rechargeAmount" placeholder="Enter Amount (min ₹10)">
<input id="screenshot" placeholder="Paste Screenshot Link">
<button onclick="submitRecharge()">Submit Request</button>
</div>

<!-- CREATE RIDE -->
<div class="card">
<h3>Create Ride</h3>
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="via" placeholder="Via route">
<input id="date" type="date">
<input id="time" type="time">
<input id="km" placeholder="KM">
<input id="seats" placeholder="Seats">

<select id="type">
<option value="Free">Free</option>
<option value="Paid">Paid</option>
</select>

<input id="coins" placeholder="Coins (for Paid ride)">

<button onclick="createRide()">Create Ride</button>
</div>

<!-- RIDES -->
<div class="card">
<h3>Live Rides</h3>
<div id="rides">Loading...</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCLQbR69NBKmyFK_DzIk8Dz_eFc6UWCQdg",
  authDomain: "togosaaythi-n.firebaseapp.com",
  databaseURL: "https://togosaaythi-n-default-rtdb.firebaseio.com/",
  projectId: "togosaaythi-n"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 👤 USER SYSTEM
let userId = localStorage.getItem("userId");
if(!userId){
  userId = "user_" + Math.floor(Math.random()*100000);
  localStorage.setItem("userId", userId);

  // give free 100 coins
  update(ref(db,"users/"+userId), {coins:100});
}
document.getElementById("userId").innerText = "User: " + userId;

// 💰 LOAD COINS
function loadCoins(){
  onValue(ref(db,"users/"+userId), snap=>{
    let data = snap.val();
    document.getElementById("coins").innerText = data?.coins || 0;
  });
}
loadCoins();

// 💸 SEND COINS
window.sendCoins = async function(){
  let to = document.getElementById("sendTo").value;
  let amount = parseInt(document.getElementById("amount").value);

  if(!to || !amount) return alert("Fill all");

  let senderSnap = await get(ref(db,"users/"+userId));
  let receiverSnap = await get(ref(db,"users/"+to));

  if(!receiverSnap.exists()) return alert("User not found");

  let senderCoins = senderSnap.val().coins || 0;

  if(senderCoins < amount) return alert("Not enough coins");

  update(ref(db,"users/"+userId), {coins: senderCoins - amount});
  update(ref(db,"users/"+to), {coins: (receiverSnap.val().coins || 0) + amount});

  alert("Sent");
};

// 💳 RECHARGE REQUEST
window.submitRecharge = function(){
  let amt = parseInt(document.getElementById("rechargeAmount").value);
  let screenshot = document.getElementById("screenshot").value;

  if(amt < 10) return alert("Minimum ₹10");

  push(ref(db,"recharges"),{
    user:userId,
    amount:amt,
    screenshot:screenshot,
    status:"Pending"
  });

  alert("Request submitted");
};

// 🚗 CREATE RIDE
window.createRide = function(){

  let ride = {
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    via: document.getElementById("via").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    km: parseInt(document.getElementById("km").value),
    seats: document.getElementById("seats").value,
    type: document.getElementById("type").value,
    coins: parseInt(document.getElementById("coins").value) || 0,
    createdBy:userId,
    status: "Scheduled",
    createdAt: Date.now()
  };

  push(ref(db, "rides"), ride);
};

// 📦 LOAD RIDES (unchanged logic)
onValue(ref(db, "rides"), (snapshot) => {

  let data = snapshot.val();
  let html = "";

  if(!data){
    document.getElementById("rides").innerHTML = "No rides";
    return;
  }

  let now = Date.now();

  for(let id in data){
    let r = data[id];

    if(r.status==="Completed" || r.status==="Expired") continue;

    html += `
    <div class="ride">
      <b>${r.from} → ${r.to}</b><br>
      ${r.date} ${r.time}<br>
      Type: ${r.type} | Coins: ${r.coins}<br>

      <input id="price${id}" placeholder="Offer price">
      <button onclick="requestRide('${id}')">Offer</button>
    </div>
    `;
  }

  document.getElementById("rides").innerHTML = html;
});

// 🎯 REQUEST
window.requestRide = function(id){
  let price = document.getElementById("price"+id).value;

  push(ref(db, "requests/"+id), {
    user:userId,
    price: price
  });

  alert("Offer sent");
};

</script>

</body>
</html>
