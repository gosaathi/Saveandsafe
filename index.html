<!DOCTYPE html>
<html>
<head>
<title>RideBuddy Real</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{font-family:Arial;background:#f2f2f2}
.card{background:white;padding:10px;margin:10px;border-radius:10px}
button{padding:10px;width:100%;margin-top:5px}
input,select{width:100%;padding:8px;margin-top:5px}
</style>
</head>

<body>

<div class="card">
<h3>Your Wallet</h3>
<p id="userId"></p>
<p>Coins: <span id="coins">0</span></p>

<input id="sendTo" placeholder="Receiver User ID">
<input id="amount" placeholder="Amount">
<button onclick="sendCoins()">Send Coins</button>
</div>

<div class="card">
<h3>Create Ride</h3>
<input id="from" placeholder="From">
<input id="to" placeholder="To">

<select id="type">
<option value="Free">Free</option>
<option value="Paid">Paid</option>
</select>

<input id="rideCoins" placeholder="Coins (for Paid Ride)">
<button onclick="createRide()">Create Ride</button>
</div>

<div class="card">
<h3>Rides</h3>
<div id="rides"></div>
</div>

<script type="module">

// ✅ Firebase v10 Correct Import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCLQbR69NBKmyFK_DzIk8Dz_eFc6UWCQdg",
  authDomain: "togosaaythi-n.firebaseapp.com",
  projectId: "togosaaythi-n"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ SIMPLE USER SYSTEM
let userId = localStorage.getItem("userId");

if(!userId){
  userId = "user_" + Math.floor(Math.random()*100000);
  localStorage.setItem("userId", userId);
}

document.getElementById("userId").innerText = "User ID: " + userId;

// ✅ CREATE WALLET IF NOT EXISTS
async function initWallet(){
  const ref = doc(db, "users", userId);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref, {coins: 100}); // starting coins
  }

  loadCoins();
}

async function loadCoins(){
  const ref = doc(db, "users", userId);
  const snap = await getDoc(ref);
  document.getElementById("coins").innerText = snap.data().coins;
}

// 💸 SEND COINS
async function sendCoins(){
  let to = document.getElementById("sendTo").value;
  let amount = parseInt(document.getElementById("amount").value);

  if(!to || !amount) return alert("Fill all");

  const senderRef = doc(db, "users", userId);
  const receiverRef = doc(db, "users", to);

  const senderSnap = await getDoc(senderRef);
  const receiverSnap = await getDoc(receiverRef);

  if(!receiverSnap.exists()){
    alert("Receiver not found");
    return;
  }

  let senderCoins = senderSnap.data().coins;

  if(senderCoins < amount){
    alert("Not enough coins");
    return;
  }

  await updateDoc(senderRef, {coins: senderCoins - amount});
  await updateDoc(receiverRef, {
    coins: receiverSnap.data().coins + amount
  });

  alert("Coins Sent");
  loadCoins();
}

// 🚗 CREATE RIDE
async function createRide(){
  let type = document.getElementById("type").value;
  let coins = parseInt(document.getElementById("rideCoins").value) || 0;

  await addDoc(collection(db, "Rides"), {
    from:document.getElementById("from").value,
    to:document.getElementById("to").value,
    type:type,
    coins:type==="Paid"?coins:0,
    createdBy:userId,
    status:"Waiting"
  });
}

// 📦 LOAD RIDES
function loadRides(){
  onSnapshot(collection(db, "Rides"), snapshot=>{
    let div = document.getElementById("rides");
    div.innerHTML="";

    snapshot.forEach(docSnap=>{
      let r = docSnap.data();

      div.innerHTML += `
        <div class="card">
          ${r.from} → ${r.to}<br>
          Type: ${r.type}<br>
          Coins: ${r.coins}<br>
          Status: ${r.status}<br>

          ${
            r.type==="Paid" && r.createdBy!==userId
            ? `<button onclick="acceptRide('${docSnap.id}', ${r.coins}, '${r.createdBy}')">Accept Ride</button>`
            : ""
          }
        </div>
      `;
    });
  });
}

// 🎯 ACCEPT RIDE (TRANSFER COINS)
window.acceptRide = async function(id, coins, owner){

  const myRef = doc(db, "users", userId);
  const ownerRef = doc(db, "users", owner);

  const mySnap = await getDoc(myRef);

  if(mySnap.data().coins < coins){
    alert("Not enough coins");
    return;
  }

  await updateDoc(myRef, {
    coins: mySnap.data().coins - coins
  });

  const ownerSnap = await getDoc(ownerRef);

  await updateDoc(ownerRef, {
    coins: ownerSnap.data().coins + coins
  });

  await updateDoc(doc(db, "Rides", id), {
    status:"Completed"
  });

  alert("Ride Accepted & Paid");
  loadCoins();
}

// INIT
initWallet();
loadRides();

</script>

</body>
</html>
