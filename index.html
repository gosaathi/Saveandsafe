<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ride Buddy Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* HEADER */
.header {
  background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
  color:white;
  padding:25px;
  text-align:center;
}

.header h1 {
  margin:0;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-around;
  background:#007bff;
  color:white;
  padding:10px;
}

.nav button {
  background:none;
  border:none;
  color:white;
  font-weight:bold;
}

/* CONTAINER */
.container {
  padding:15px;
}

/* CARD */
.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* INPUT */
input, select, button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  background:#007bff;
  color:white;
  border:none;
}

/* RIDE CARD */
.ride {
  background:white;
  border-radius:12px;
  margin-top:15px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.ride img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.ride-content {
  padding:10px;
}

.chat-box {
  background:#eee;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
  <h1>🚀 Ride Buddy</h1>
  <p>Find Travel Partner • Earn • Save</p>
</div>

<div class="nav">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('create')">Create Ride</button>
  <button onclick="showPage('profile')">Profile</button>
</div>

<div class="container">

<!-- HOME -->
<div id="home">

<div class="card">
  <h3>Available Rides</h3>
  <div id="rides"></div>
</div>

</div>

<!-- CREATE -->
<div id="create" style="display:none">

<div class="card">
  <h3>Create Ride</h3>

  <input id="from" placeholder="From">
  <input id="to" placeholder="To">

  <select id="type">
    <option value="Free">Free Ride</option>
    <option value="Paid">Paid Ride</option>
  </select>

  <input id="seats" placeholder="Seats">

  <button onclick="createRide()">Start Journey</button>
</div>

</div>

<!-- PROFILE -->
<div id="profile" style="display:none">

<div class="card">
  <h3>User Profile</h3>
  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone">
  <button onclick="saveProfile()">Save</button>
</div>

</div>

</div>

<script>

let rides = JSON.parse(localStorage.getItem("rides")) || [];
let user = JSON.parse(localStorage.getItem("user")) || {};

function save(){
  localStorage.setItem("rides", JSON.stringify(rides));
}

function saveProfile(){
  user.name = document.getElementById("name").value;
  user.phone = document.getElementById("phone").value;
  localStorage.setItem("user", JSON.stringify(user));
  alert("Profile Saved");
}

function showPage(p){
  document.getElementById("home").style.display="none";
  document.getElementById("create").style.display="none";
  document.getElementById("profile").style.display="none";
  document.getElementById(p).style.display="block";
}

function createRide(){
  let ride = {
    id: Date.now(),
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    type: document.getElementById("type").value,
    seats: document.getElementById("seats").value,
    status: "Waiting",
    requests: [],
    chat:[]
  };

  rides.push(ride);
  save();
  loadRides();
  showPage('home');
}

function loadRides(){
  let div = document.getElementById("rides");
  div.innerHTML="";

  rides.forEach(r=>{

    let html = `
    <div class="ride">
      <img src="https://images.unsplash.com/photo-1519003722824-194d4455a60c">
      <div class="ride-content">
        <b>${r.from} → ${r.to}</b><br>
        Type: ${r.type}<br>
        Seats: ${r.seats}<br>
        Status: ${r.status}<br>

        ${r.type==="Paid" ? `<input id="price${r.id}" placeholder="Offer Price">` : ``}

        <button onclick="requestRide(${r.id})">Request</button>
        <button onclick="startRide(${r.id})">Start</button>
        <button onclick="completeRide(${r.id})">Complete</button>

        <div class="chat-box">
          <input id="msg${r.id}" placeholder="Message">
          <button onclick="sendMsg(${r.id})">Send</button>
          <div id="chat${r.id}"></div>
        </div>

        <div id="req${r.id}"></div>
      </div>
    </div>
    `;

    div.innerHTML += html;

    let reqDiv = document.getElementById("req"+r.id);
    r.requests.forEach(req=>{
      let p = document.createElement("p");
      p.innerText = "Request: " + (req.price ? "₹"+req.price : "Free Join");
      reqDiv.appendChild(p);
    });

    let chatDiv = document.getElementById("chat"+r.id);
    r.chat.forEach(c=>{
      let p = document.createElement("p");
      p.innerText = c;
      chatDiv.appendChild(p);
    });

  });
}

function requestRide(id){
  let ride = rides.find(r=>r.id==id);
  let priceInput = document.getElementById("price"+id);
  let price = priceInput ? priceInput.value : "Free";
  ride.requests.push({price:price});
  save();
  loadRides();
}

function startRide(id){
  let ride = rides.find(r=>r.id==id);
  ride.status="Started";
  save();
  loadRides();
}

function completeRide(id){
  let ride = rides.find(r=>r.id==id);
  ride.status="Completed";
  save();
  loadRides();
}

function sendMsg(id){
  let msg = document.getElementById("msg"+id).value;
  let ride = rides.find(r=>r.id==id);
  ride.chat.push(msg);
  save();
  loadRides();
}

loadRides();

</script>

</body>
</html>
