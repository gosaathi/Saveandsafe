<!DOCTYPE html>
<html>
<head>
<title>GoSaathi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0}
.header{background:#16A34A;color:white;padding:15px;text-align:center}
.card{background:white;padding:10px;margin:10px;border-radius:10px}
button{padding:10px;width:100%;margin-top:5px;background:#2563EB;color:white;border:none}
</style>
</head>

<body>

<div class="header">
<h2>🚀 GoSaathi</h2>
<p>Go Smart. Go Saathi.</p>
</div>

<div class="card">
<button onclick="login()">Login with Google</button>
<p id="user"></p>
<p id="coins"></p>
</div>

<div class="card">
<h3>Add Money</h3>
<button onclick="addMoney(10)">Add ₹10</button>
</div>

<div class="card">
<h3>Create Ride</h3>
<input id="from" placeholder="From">
<input id="to" placeholder="To">

<select id="type">
<option>Free</option>
<option>Paid</option>
</select>

<button onclick="createRide()">Create Ride</button>
</div>

<div class="card">
<h3>Rides</h3>
<div id="rides"></div>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCLQbR69NBKmyFK_DzIk8Dz_eFc6UWCQdg",
  authDomain: "togosaaythi-n.firebaseapp.com",
  projectId: "togosaaythi-n",
  storageBucket: "togosaaythi-n.firebasestorage.app",
  messagingSenderId: "1035484636234",
  appId: "1:1035484636234:web:dd3c092b594f46f9a3f2b3"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser;

// LOGIN
function login(){
  let provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(result=>{
    currentUser = result.user;

    db.collection("Users").doc(currentUser.uid).set({
      name: currentUser.displayName,
      email: currentUser.email,
      coins: 100
    }, {merge:true});

    document.getElementById("user").innerText = currentUser.displayName;

    loadCoins();
    loadRides();
  });
}

// LOAD COINS
function loadCoins(){
  db.collection("Users").doc(currentUser.uid)
  .onSnapshot(doc=>{
    document.getElementById("coins").innerText =
      "Coins: " + doc.data().coins;
  });
}

// ADD MONEY
function addMoney(amount){
  let upi = `upi://pay?pa=mratnamnalli@ybl&pn=GoSaathi&am=${amount}&cu=INR`;
  window.location.href = upi;

  db.collection("Payments").add({
    userId: currentUser.uid,
    amount: amount,
    status: "pending"
  });

  alert("Payment sent. Wait for approval");
}

// CREATE RIDE
function createRide(){
  db.collection("Rides").add({
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    type: document.getElementById("type").value,
    userId: currentUser.uid,
    status: "Waiting"
  });
}

// LOAD RIDES
function loadRides(){
  db.collection("Rides").onSnapshot(snapshot=>{
    let div = document.getElementById("rides");
    div.innerHTML="";

    snapshot.forEach(doc=>{
      let r = doc.data();

      div.innerHTML += `
      <div class="card">
        ${r.from} → ${r.to}<br>
        Type: ${r.type}<br>

        <button onclick="requestRide('${doc.id}')">Request</button>
        <button onclick="startRide('${doc.id}')">Start</button>
        <button onclick="completeRide('${doc.id}')">Complete</button>

        <input id="msg${doc.id}" placeholder="Chat">
        <button onclick="sendMsg('${doc.id}')">Send</button>
        <div id="chat${doc.id}"></div>

      </div>
      `;

      loadChat(doc.id);
    });
  });
}

// REQUEST
function requestRide(id){
  db.collection("Requests").add({
    rideId: id,
    userId: currentUser.uid
  });
}

// START RIDE
function startRide(id){
  navigator.geolocation.watchPosition(pos=>{
    db.collection("Rides").doc(id).update({
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      status: "Started"
    });
  });
}

// COMPLETE RIDE
function completeRide(id){
  db.collection("Rides").doc(id).update({
    status: "Completed"
  });
}

// CHAT
function sendMsg(id){
  let msg = document.getElementById("msg"+id).value;

  db.collection("Chats").doc(id)
  .collection("messages").add({
    text: msg,
    user: currentUser.displayName,
    time: Date.now()
  });
}

// LOAD CHAT
function loadChat(id){
  db.collection("Chats").doc(id)
  .collection("messages").orderBy("time")
  .onSnapshot(snapshot=>{
    let div = document.getElementById("chat"+id);
    if(!div) return;

    div.innerHTML="";
    snapshot.forEach(doc=>{
      div.innerHTML += `<p>${doc.data().user}: ${doc.data().text}</p>`;
    });
  });
}

</script>

</body>
</html>
