<!DOCTYPE html>
<html>
<head>
<title>RideBuddy Real</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#f2f2f2}
.card{background:white;padding:10px;margin:10px;border-radius:10px}
button{padding:10px;width:100%}
</style>
</head>

<body>

<div class="card">
<h3>Login (OTP)</h3>
<input id="phone" placeholder="+91xxxxxxxxxx">
<button onclick="sendOTP()">Send OTP</button>

<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify</button>
</div>

<div class="card">
<h3>Create Ride</h3>
<input id="from" placeholder="From">
<input id="to" placeholder="To">

<select id="type">
<option>Free</option>
<option>Paid</option>
</select>

<button onclick="createRide()">Create</button>
</div>

<div class="card">
<h3>Rides</h3>
<div id="rides"></div>
</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCLQbR69NBKmyFK_DzIk8Dz_eFc6UWCQdg",
  authDomain: "togosaaythi-n.firebaseapp.com",
  projectId: "togosaaythi-n"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let confirmationResult;

// OTP SEND
function sendOTP(){
  let phone = document.getElementById("phone").value;

  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('phone');

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
  .then(result=>{
    confirmationResult = result;
    alert("OTP Sent");
  });
}

// OTP VERIFY
function verifyOTP(){
  let otp = document.getElementById("otp").value;

  confirmationResult.confirm(otp)
  .then(()=>{
    alert("Login Success");
    loadRides();
  });
}

// CREATE RIDE
function createRide(){
  db.collection("Rides").add({
    from:document.getElementById("from").value,
    to:document.getElementById("to").value,
    type:document.getElementById("type").value,
    status:"Waiting"
  });
}

// LOAD RIDES
function loadRides(){
  db.collection("Rides").onSnapshot(snapshot=>{
    let div = document.getElementById("rides");
    div.innerHTML="";

    snapshot.forEach(doc=>{
      let r = doc.data();

      div.innerHTML += `
        <div class="card">
          ${r.from} → ${r.to}<br>
          ${r.type}<br>
          ${r.status}
        </div>
      `;
    });
  });
}

</script>

</body>
</html>
