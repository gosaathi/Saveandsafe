<!DOCTYPE html>
<html>
<head>
<title>GoSaathi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9}

/* HEADER */
.header{
  background:#16A34A;
  color:white;
  padding:15px;
  text-align:center;
}

/* PAGE */
.page{display:none;padding:10px}
.active{display:block}

/* CARD */
.card{
  background:white;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* BUTTON */
button{
  padding:10px;
  width:100%;
  margin-top:6px;
  border:none;
  border-radius:8px;
  background:#2563EB;
  color:white;
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin-top:6px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}

.navbar button{
  flex:1;
  background:none;
  color:#333;
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
  <button onclick="login()">Login with Google</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<div class="header">
  <h2>GoSaathi 🚀</h2>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <h3>Available Rides</h3>
  <div id="rides"></div>
</div>

<!-- CREATE -->
<div id="create" class="page">
  <h3>Create Ride</h3>

  <input id="from" placeholder="From">
  <input id="to" placeholder="To">
  <input id="via" placeholder="Via (optional)">

  <select id="type">
    <option>Free</option>
    <option>Paid</option>
  </select>

  <select id="gender">
    <option value="All">All</option>
    <option value="Women">Only Women</option>
  </select>

  <button onclick="createRide()">Create Ride</button>
</div>

<!-- WALLET -->
<div id="wallet" class="page">
  <h3>Wallet</h3>
  <p id="coins"></p>

  <h4>Scan & Pay</h4>
  <img src="your-qr-image.jpg" style="width:100%;border-radius:10px">

  <button onclick="requestCoins()">I Paid ₹10</button>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
  <h3>Profile</h3>
  <p id="user"></p>
</div>

</div>

<!-- NAVBAR -->
<div class="navbar">
  <button onclick="show('home')">Home</button>
  <button onclick="show('create')">Create</button>
  <button onclick="show('wallet')">Wallet</button>
  <button onclick="show('profile')">Profile</button>
</div>

<script>

// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCLQbR69NBKmyFK_DzIk8Dz_eFc6UWCQdg",
  authDomain: "togosaaythi-n.firebaseapp.com",
  projectId: "togosaaythi-n",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;
<script>
// LOGIN
function login(){
  
const provider = new firebase.auth.GoogleAuthProvider();

function login(){
  firebase.auth().signInWithRedirect(provider);
}

// Redirect result handle
firebase.auth().getRedirectResult().then(result=>{
  if(result.user){

    let user = result.user;

    db.collection("Users").doc(user.uid).set({
      name: user.displayName,
      email: user.email,
      coins: 100
    }, {merge:true});

    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("user").innerText = user.displayName;

    loadCoins();
    loadRides();
  }
});
}    

  <script>
// NAVIGATION
function show(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById(p).classList.add('active');
}

// COINS
function loadCoins(){
  db.collection("Users").doc(user.uid).onSnapshot(doc=>{
    document.getElementById("coins").innerText="Coins: "+doc.data().coins;
  });
}

// CREATE RIDE
function createRide(){
  db.collection("Rides").add({
    from:from.value,
    to:to.value,
    via:via.value,
    type:type.value,
    gender:gender.value,
    userId:user.uid
  });
}

// LOAD RIDES
function loadRides(){
  db.collection("Rides").onSnapshot(snap=>{
    let div=document.getElementById("rides");
    div.innerHTML="";

    snap.forEach(doc=>{
      let r=doc.data();

      div.innerHTML+=`
      <div class="card">
        <b>${r.from} → ${r.to}</b><br>
        Via: ${r.via || "-"}<br>
        Type: ${r.type}<br>
        ${r.gender=="Women"?"👩 Women Only":""}

        <button onclick="joinRide('${doc.id}')">Join</button>
      </div>
      `;
    });
  });
}

// JOIN RIDE
function joinRide(id){
  alert("Request Sent");
}

// REQUEST COINS
function requestCoins(){
  db.collection("Payments").add({
    userId:user.uid,
    amount:10,
    status:"pending"
  });

  alert("Request sent. Admin will add coins.");
}

</script>

</body>
</html>
