<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ride Share Buddy</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#0f2027,#2c5364);
  color:white;
}

header {
  text-align:center;
  padding:15px;
  background:#00000080;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

.container {
  padding:15px;
}

.card {
  background:white;
  color:black;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#007bff;
  color:white;
  font-weight:bold;
}

.ride {
  background:#fff;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

.status {
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div class="logo">🚀 Ride Share Buddy</div>
  <small>Schedule • Share • Earn</small>
</header>

<div class="container">

<div class="card">
  <h3>Create Ride</h3>
  <input id="from" placeholder="From Location">
  <input id="to" placeholder="To Location">
  <input id="via" placeholder="Route (via places)">
  <input id="date" type="date">
  <input id="time" type="time">
  <input id="km" placeholder="Distance KM">
  <input id="seats" placeholder="Seats">
  <button onclick="createRide()">Create Ride</button>
</div>

<div class="card">
  <h3>Available Rides</h3>
  <div id="ridesList"></div>
</div>

</div>

<script>

let rides = JSON.parse(localStorage.getItem("rides")) || [];

function saveData(){
  localStorage.setItem("rides", JSON.stringify(rides));
}

function createRide(){
  let ride = {
    id: Date.now(),
    from: from.value,
    to: to.value,
    via: via.value,
    date: date.value,
    time: time.value,
    km: km.value,
    seats: seats.value,
    status: "Scheduled",
    requests:[]
  };

  if(ride.km < 5){
    alert("Minimum 5KM required");
    return;
  }

  rides.push(ride);
  saveData();
  loadRides();
}

function loadRides(){
  let list = document.getElementById("ridesList");
  list.innerHTML = "";

  rides.forEach(r => {

    let div = document.createElement("div");
    div.className = "ride";

    div.innerHTML = `
      <b>${r.from} → ${r.to}</b><br>
      Via: ${r.via}<br>
      Date: ${r.date} | Time: ${r.time}<br>
      KM: ${r.km} | Seats: ${r.seats}<br>
      <span class="status">Status: ${r.status}</span><br>

      <input placeholder="Offer Price" id="price${r.id}">
      <button onclick="requestRide(${r.id})">Request Ride</button>

      ${r.status=="Scheduled" ? `<button onclick="startRide(${r.id})">Start Ride</button>` : ""}

      ${r.status=="Started" ? `<button onclick="completeRide(${r.id})">Complete Ride</button>` : ""}

      <div id="req${r.id}"></div>
    `;

    list.appendChild(div);

    let reqDiv = document.getElementById("req"+r.id);
    r.requests.forEach(req=>{
      let p = document.createElement("p");
      p.innerText = "Request: ₹"+req.price;
      reqDiv.appendChild(p);
    });

  });
}

function requestRide(id){
  let price = document.getElementById("price"+id).value;

  let ride = rides.find(r=>r.id==id);
  ride.requests.push({price:price});

  saveData();
  loadRides();
}

function startRide(id){
  let ride = rides.find(r=>r.id==id);
  ride.status = "Started";
  saveData();
  loadRides();
}

function completeRide(id){
  let ride = rides.find(r=>r.id==id);
  ride.status = "Completed";
  saveData();
  loadRides();
}

loadRides();

</script>

</body>
</html>
