<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ride Share Live</title>

<style>
body {
  font-family: Arial;
  margin:0;
  background: linear-gradient(135deg,#141e30,#243b55);
  color:white;
}

header {
  text-align:center;
  padding:15px;
  background:#00000080;
}

.container {
  padding:15px;
}

.card {
  background:white;
  color:black;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#28a745;
  color:white;
  font-weight:bold;
}

.ride {
  background:#fff;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <h2>🚀 Ride Share Live</h2>
</header>

<div class="container">

<div class="card">
<h3>Create Ride</h3>
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="via" placeholder="Via route">
<input id="date" type="date">
<input id="time" type="time">
<input id="km" placeholder="KM">
<input id="seats" placeholder="Seats">
<button onclick="createRide()">Create Ride</button>
</div>

<div class="card">
<h3>Live Rides</h3>
<div id="rides">Loading...</div>
</div>

</div>
