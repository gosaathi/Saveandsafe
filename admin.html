<!DOCTYPE html>
<html>
<head>
    <title>Gosaathi Admin</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: Arial; background: #111; color: white; padding: 20px; }
        .card { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; }
        .btn-approve { background: #28a745; color: white; padding: 10px; border: none; cursor: pointer; }
        .btn-delete { background: #dc3545; color: white; padding: 10px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚀 Gosaathi Admin</h1>

    <h3>Coin Purchase Requests</h3>
    <div id="pendingPayments"></div>

    <h3>Active Rides</h3>
    <div id="allRides"></div>

    <script>
        // Add this at the top of your script
const provider = new firebase.auth.GoogleAuthProvider();

function adminLogin() {
    firebase.auth().signInWithPopup(provider)
    .then((result) => {
        console.log("Logged in as:", result.user.email);
        // Once logged in, the listeners (loadPayments, etc.) will start working automatically
        initAdmin(); 
    }).catch((error) => {
        alert("Login failed: " + error.message);
    });
}

// Wrap your data loading in a function
function initAdmin() {
    loadPayments();
    loadRides();
    loadReports();
}

// Optional: Auto-check if already logged in
firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        initAdmin();
    } else {
        // Show a login button if not logged in
        document.body.innerHTML = '<button onclick="adminLogin()">Login to Admin Panel</button>' + document.body.innerHTML;
    }
});

        
        const firebaseConfig = { apiKey: "AIzaSyCLQbR69NBKmyFK_DzIk8Dz_eFc6UWCQdg", authDomain: "togosaaythi-n.firebaseapp.com", projectId: "togosaaythi-n" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Approve Coins Logic
        function approvePayment(payId, userId, amount) {
            const coinsToAdd = amount * 10;
            db.collection("Users").doc(userId).update({
                coins: firebase.firestore.FieldValue.increment(coinsToAdd)
            });
            db.collection("Payments").doc(payId).update({ status: "Approved" });
        }

        db.collection("Payments").where("status", "==", "Pending").onSnapshot(snap => {
            const div = document.getElementById('pendingPayments');
            div.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                div.innerHTML += `
                    <div class="card">
                        User: ${p.userName} | Amount: ₹${p.amount}<br>
                        <button class="btn-approve" onclick="approvePayment('${doc.id}', '${p.userId}', ${p.amount})">Approve ${p.amount*10} Coins</button>
                    </div>`;
            });
        });

        db.collection("Rides").onSnapshot(snap => {
            const div = document.getElementById('allRides');
            div.innerHTML = "";
            snap.forEach(doc => {
                const r = doc.data();
                div.innerHTML += `<div class="card">${r.from} to ${r.to} (${r.status})</div>`;
            });
        });
    </script>
</body>
</html>
