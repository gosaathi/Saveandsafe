<!DOCTYPE html>
<html>
<head>
<title>RideBuddy Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#111;color:white}
h2{text-align:center}

.card{
  background:#222;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

button{
  padding:8px;
  margin-top:5px;
  width:100%;
  background:red;
  color:white;
  border:none;
}
</style>
</head>

<body>

<h2>🚀 Admin Panel</h2>

<div class="card">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="card">
  <h3>Rides</h3>
  <div id="rides"></div>
</div>

<div class="card">
  <h3>Reports</h3>
  <div id="reports"></div>
</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOAD USERS
function loadUsers(){
  db.collection("Users").onSnapshot(snap=>{
    let div = document.getElementById("users");
    div.innerHTML="";

    snap.forEach(doc=>{
      let u = doc.data();

      div.innerHTML += `
        <div class="card">
          ${u.name || "No Name"}<br>
          ${u.phone || ""}

          <button onclick="deleteUser('${doc.id}')">Delete User</button>
        </div>
      `;
    });
  });
}

// DELETE USER
function deleteUser(id){
  db.collection("Users").doc(id).delete();
}

// LOAD RIDES
function loadRides(){
  db.collection("Rides").onSnapshot(snap=>{
    let div = document.getElementById("rides");
    div.innerHTML="";

    snap.forEach(doc=>{
      let r = doc.data();

      div.innerHTML += `
        <div class="card">
          ${r.from} → ${r.to}<br>
          ${r.type} | ${r.status}

          <button onclick="deleteRide('${doc.id}')">Delete Ride</button>
        </div>
      `;
    });
  });
}

// DELETE RIDE
function deleteRide(id){
  db.collection("Rides").doc(id).delete();
}

// LOAD REPORTS
function loadReports(){
  db.collection("Reports").onSnapshot(snap=>{
    let div = document.getElementById("reports");
    div.innerHTML="";

    snap.forEach(doc=>{
      let r = doc.data();

      div.innerHTML += `
        <div class="card">
          User: ${r.userId}<br>
          Reason: ${r.reason}

          <button onclick="deleteReport('${doc.id}')">Resolve</button>
        </div>
      `;
    });
  });
}

// DELETE REPORT
function deleteReport(id){
  db.collection("Reports").doc(id).delete();
}

// INIT
loadUsers();
loadRides();
loadReports();

</script>

</body>
</html>
