<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gosaathi Admin - Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --success: #28a745; --danger: #dc3545; --warning: #ffcc00; --dark-bg: #111; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark-bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #222; padding: 20px; border-radius: 10px; border-top: 4px solid var(--warning); text-align: center; }
        .card { background: #222; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; position: relative; }
        .btn-approve { background: var(--success); color: white; padding: 8px 15px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-reject { background: var(--danger); color: white; padding: 8px 15px; border: none; cursor: pointer; border-radius: 5px; margin-left: 10px; }
        .btn-login { background: #007bff; color: white; padding: 15px 30px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 1.2em; }
        .utr-text { color: var(--warning); font-family: monospace; font-size: 1.2em; background: #333; padding: 2px 8px; border-radius: 4px; }
        #loginOverlay { text-align: center; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #adminContent { display: none; }
        .badge { padding: 3px 8px; border-radius: 5px; font-size: 0.8em; margin-left: 10px; }
        .badge-paid { background: #28a745; }
        .badge-free { background: #6c757d; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <img src="logo.png" alt="Gosaathi" style="height: 100px; margin-bottom: 20px;">
        <h1>🚀 Gosaathi Admin Portal</h1>
        <p>Login with your Admin account to manage requests.</p>
        <button class="btn-login" onclick="adminLogin()">Login with Google</button>
    </div>

    <div id="adminContent" class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🚀 Admin Dashboard</h1>
            <button onclick="auth.signOut()" style="background:none; color: #888; border: 1px solid #444; cursor: pointer; border-radius: 5px; padding: 5px 10px;">Logout</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Pending Requests</small>
                <h2 id="stat-pending">0</h2>
            </div>
            <div class="stat-card" style="border-top-color: var(--success);">
                <small>Active Rides</small>
                <h2 id="stat-rides">0</h2>
            </div>
        </div>
        
        <h3>💳 Coin Purchase Requests</h3>
        <div id="pendingPayments">Loading...</div>

        <h3>🚗 Active Rides</h3>
        <div id="allRides">Loading...</div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyCLQbR69NBKmyFK_DzIk8Dz_eFc6UWCQdg", 
            authDomain: "togosaaythi-n.firebaseapp.com", 
            projectId: "togosaaythi-n" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function adminLogin() {
            auth.signInWithPopup(provider).catch(err => alert("Login failed: " + err.message));
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                // IMPORTANT: In production, check if user.uid === 'YOUR_ADMIN_UID'
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                initAdmin(); 
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'none';
            }
        });

        function initAdmin() {
            loadPayments();
            loadRides();
        }

        function loadPayments() {
            db.collection("Payments").where("status", "==", "Pending").onSnapshot(snap => {
                document.getElementById('stat-pending').innerText = snap.size;
                const div = document.getElementById('pendingPayments');
                div.innerHTML = "";
                
                if (snap.empty) { div.innerHTML = "<p style='color: #666;'>No pending requests.</p>"; return; }

                snap.forEach(doc => {
                    const p = doc.data();
                    const date = new Date(p.time).toLocaleString();
                    div.innerHTML += `
                        <div class="card">
                            <small style="color: #888;">${date}</small><br>
                            <b>User:</b> ${p.userName} <br>
                            <b>Amount:</b> ₹${p.amount} <br>
                            <b>UTR ID:</b> <span class="utr-text">${p.utr}</span> <br>
                            <div style="margin-top:10px;">
                                <button class="btn-approve" onclick="approvePayment('${doc.id}', '${p.userId}', ${p.amount})">Approve & Activate</button>
                                <button class="btn-reject" onclick="rejectPayment('${doc.id}')">Reject</button>
                            </div>
                        </div>`;
                });
            });
        }

        function loadRides() {
            db.collection("Rides").where("status", "==", "Available").onSnapshot(snap => {
                document.getElementById('stat-rides').innerText = snap.size;
                const div = document.getElementById('allRides');
                div.innerHTML = "";
                
                if (snap.empty) { div.innerHTML = "<p style='color: #666;'>No active rides.</p>"; return; }
                
                snap.forEach(doc => {
                    const r = doc.data();
                    const typeBadge = r.type === 'Paid' ? 'badge-paid' : 'badge-free';
                    div.innerHTML += `
                        <div class="card">
                            <b>${r.from} ➔ ${r.to}</b> 
                            <span class="badge ${typeBadge}">${r.type}</span><br>
                            <small>Driver: ${r.driverName} | Seats: ${r.seats} | Via: ${r.route}</small>
                        </div>`;
                });
            });
        }

        function approvePayment(payId, userId, amount) {
            if(!confirm("Are you sure you want to approve this?")) return;
            
            const coinsToAdd = amount * 10;
            const batch = db.batch();

            const userRef = db.collection("Users").doc(userId);
            const payRef = db.collection("Payments").doc(payId);

            batch.update(userRef, {
                coins: firebase.firestore.FieldValue.increment(coinsToAdd),
                membership: "Active"
            });

            batch.update(payRef, { status: "Approved" });

            batch.commit().then(() => {
                alert("Success! User Activated & " + coinsToAdd + " Coins added.");
            }).catch(err => alert("Error: " + err.message));
        }

        function rejectPayment(payId) {
            if(confirm("Reject this payment? The user will not get coins.")) {
                db.collection("Payments").doc(payId).update({ status: "Rejected" })
                .then(() => alert("Payment Rejected."));
            }
        }
    </script>
</body>
</html>
